<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Info - Hoenn's Last Wish</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <a href="index.html" class="logo-link">
                <img src="images/logo.png" alt="Pokémon: Hoenn's Last Wish" class="logo-img">
            </a>
            
            <div class="header-animated">
                <img src="images/jirachi-celebi00.png" 
                     alt="Jirachi & Celebi" 
                     class="animated-header-img"
                     data-normal="images/jirachi-celebi00.png"
                     data-hover="images/jirachi-celebi01.png">
            </div>
            
            <button class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </button>
            
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#story">Story</a></li>
                <li><a href="index.html#screenshots">Screenshots</a></li>
                <li><a href="index.html#download">Download</a></li>
                <li><a href="wishdex.html">WishDex</a></li>
            </ul>
        </nav>
    </header>

    <!-- Pokémon Info Section -->
    <section class="pokemon-info-section">
        <div class="container">
            <a href="wishdex.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to WishDex
            </a>
            
            <div class="pokemon-info-container" id="pokemon-info-container">
                <!-- Conteúdo será preenchido via JavaScript -->
                <div class="loading">Loading Pokémon data...</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <a href="https://www.behance.net/rafaelsanna" target="_blank" class="footer-logo-link">
                <img src="images/rs-logo.png" alt="RS - Rafael Sanna Graphics" class="footer-logo">
            </a>
            
            <div class="footer-credits">
                <p>Made by: Rafael Sanna</p>
                <a href="https://docs.google.com/document/d/1K_1i6doDUI3dhyyjtoNYlCZQZiFuHJBfjhZC-yJ3x-s/edit?usp=sharing" class="credits-btn" target="_blank">
                    View Credits
                </a>
            </div>
            
            <div class="footer-copyright">
                <p>This is a non-profit fan project. Pokémon is © Nintendo/Creatures Inc./GAME FREAK Inc.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Dados dos Pokémon baseado nos stats que você enviou
        const pokemonData = {
            1: {
                id: 1,
                name: "Bulbasaur",
                species: "Toad Pokémon",
                sprite: "images/wishdex/01.png",
                hp: 45,
                attack: 49,
                defense: 49,
                speed: 45,
                spAttack: 65,
                spDefense: 65,
                types: ["Water"],
                height: "0.7 m",
                weight: "6.9 kg",
                abilities: ["Torrent", "Swift Swim (Hidden)"],
                description: "It lounges in muddy banks where water and earth meet. Its moist skin draws nutrient rich mud into its body, and when threat approaches it burrows deep and surges out.",
                evolution: "Evolves at level 16",
                nextEvolution: "Ivysaur"
            },
            2: {
                id: 2,
                name: "Ivysaur",
                species: "Toad Pokémon",
                sprite: "images/wishdex/02.png",
                hp: 60,
                attack: 62,
                defense: 63,
                speed: 60,
                spAttack: 80,
                spDefense: 80,
                types: ["Water", "Ground"],
                height: "1.0 m",
                weight: "13.0 kg",
                abilities: ["Torrent", "Swift Swim (Hidden)"],
                description: "Its long tail helps it glide through muddy waters and balance on soft ground. It grows stronger by channeling the flow of earth and water through its sturdy body.",
                evolution: "Evolves at level 36",
                nextEvolution: "Venusaur"
            },
            3: {
                id: 3,
                name: "Venusaur",
                species: "Seed Pokémon",
                sprite: "images/wishdex/03.png",
                hp: 80,
                attack: 82,
                defense: 83,
                speed: 80,
                spAttack: 100,
                spDefense: 100,
                types: ["Water", "Ground"],
                height: "2.0 m",
                weight: "100.0 kg",
                abilities: ["Torrent", "Swift Swim (Hidden)"],
                description: "A massive fin rises from its back like an ancient spine, letting it swim through swamps and mangroves. Its mighty roar can shake the earth and split the ground.",
                evolution: "Fully evolved",
                nextEvolution: null
            }
        };

        // Função para pegar o ID da URL
        function getPokemonId() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('id'));
        }

        // Função para renderizar os stats em barras
        function renderStatBar(value, max = 255) {
            const percentage = (value / max) * 100;
            return `<div class="stat-bar"><div class="stat-fill" style="width: ${percentage}%;"></div></div>`;
        }

        // Função para renderizar o Pokémon
        function renderPokemon(pokemon) {
            if (!pokemon) return '<div class="error">Pokémon not found!</div>';
            
            return `
                <div class="pokemon-info-card">
                    <div class="pokemon-info-header">
                        <div class="pokemon-sprite-large">
                            <img src="${pokemon.sprite}" alt="${pokemon.name}">
                        </div>
                        <div class="pokemon-title">
                            <h1>${pokemon.name}</h1>
                            <p class="species">${pokemon.species}</p>
                            <div class="types">
                                ${pokemon.types.map(type => `<span class="type type-${type.toLowerCase()}">${type}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <div class="pokemon-description">
                        <h3>Description</h3>
                        <p>${pokemon.description}</p>
                    </div>
                    
                    <div class="pokemon-stats">
                        <h3>Base Stats</h3>
                        <div class="stats-grid">
                            <div class="stat">
                                <span class="stat-name">HP</span>
                                <span class="stat-value">${pokemon.hp}</span>
                                ${renderStatBar(pokemon.hp)}
                            </div>
                            <div class="stat">
                                <span class="stat-name">Attack</span>
                                <span class="stat-value">${pokemon.attack}</span>
                                ${renderStatBar(pokemon.attack)}
                            </div>
                            <div class="stat">
                                <span class="stat-name">Defense</span>
                                <span class="stat-value">${pokemon.defense}</span>
                                ${renderStatBar(pokemon.defense)}
                            </div>
                            <div class="stat">
                                <span class="stat-name">Sp. Attack</span>
                                <span class="stat-value">${pokemon.spAttack}</span>
                                ${renderStatBar(pokemon.spAttack)}
                            </div>
                            <div class="stat">
                                <span class="stat-name">Sp. Defense</span>
                                <span class="stat-value">${pokemon.spDefense}</span>
                                ${renderStatBar(pokemon.spDefense)}
                            </div>
                            <div class="stat">
                                <span class="stat-name">Speed</span>
                                <span class="stat-value">${pokemon.speed}</span>
                                ${renderStatBar(pokemon.speed)}
                            </div>
                        </div>
                    </div>
                    
                    <div class="pokemon-details">
                        <div class="detail-item">
                            <h4>Height</h4>
                            <p>${pokemon.height}</p>
                        </div>
                        <div class="detail-item">
                            <h4>Weight</h4>
                            <p>${pokemon.weight}</p>
                        </div>
                        <div class="detail-item">
                            <h4>Abilities</h4>
                            <p>${pokemon.abilities.join(', ')}</p>
                        </div>
                        <div class="detail-item">
                            <h4>Evolution</h4>
                            <p>${pokemon.evolution}</p>
                            ${pokemon.nextEvolution ? `<p class="next-evo">→ ${pokemon.nextEvolution}</p>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Carregar a página
        const pokemonId = getPokemonId();
        const pokemon = pokemonData[pokemonId];
        
        if (pokemon) {
            document.getElementById('pokemon-info-container').innerHTML = renderPokemon(pokemon);
            document.title = `${pokemon.name} - Hoenn's Last Wish`;
        } else {
            document.getElementById('pokemon-info-container').innerHTML = '<div class="error">Pokémon not found. Please go back to the <a href="wishdex.html">WishDex</a>.</div>';
        }
    </script>
</body>
</html>
